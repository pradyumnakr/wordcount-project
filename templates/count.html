{% extends 'base.html' %}

{% block content %}
<div class="stat-hero">
	<span class="stat-number">{{count}}</span>
	<span class="stat-label">words found</span>
</div>

<hr class="divider">

<span class="section-label">Original text</span>
<div class="original-text">
	{{fulltext}}
</div>

<span class="section-label">Word breakdown</span>
<table class="word-table">
	<thead>
		<tr>
			<th>Word</th>
			<th>Count</th>
		</tr>
	</thead>
	<tbody>
		{% for word, counttotal in sortedwords %}
		<tr>
			<td>{{word}}</td>
			<td>{{counttotal}}</td>
		</tr>
		{% endfor %}
	</tbody>
</table>

<a href="{% url 'home' %}" class="back-link">← Analyse another</a>
{% endblock %}
