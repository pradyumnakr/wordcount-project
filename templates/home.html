{% extends 'base.html' %}

{% block content %}
<h1>Every word<br><em>counts.</em></h1>
<p class="subtitle">Paste your text and get an instant, detailed breakdown.</p>

<form action="{% url 'count' %}">
	<div class="input-group">
		<span class="section-label">Your text</span>
		<textarea name="fulltext" placeholder="Begin typing or paste your text here..."></textarea>
	</div>
	<input type="submit" value="Analyse →" class="btn-primary">
</form>
{% endblock %}
